description: >
  Multi-vendor IOC consolidation for the Storm-2372 / EvilTokens
  device code phishing campaign active Mar-Apr 2026. Microsoft
  Defender Security Research (Apr 6 2026) attributed the
  AI-augmented evolution to Storm-2372 with moderate confidence as
  Russian-aligned and published 4 CIDR ranges for Railway.com and
  HZ Hosting authentication backend. Huntress (Mar 25 2026) and
  Arctic Wolf identified 3 dominant Railway egress IPs handling
  ~84 percent of observed sign-in events. Sekoia TDR (Mar 30 2026,
  upd. Apr 13) reverse-engineered the EvilTokens PhaaS backend (an
  AI-generated Node.js app exposing 8 REST endpoints) and enumerated
  34 self-hosted phishing domains plus 38 Cloudflare Workers
  admin-hosted lures impersonating Adobe, DocuSign, OneDrive,
  SharePoint, voicemail. PhaaS first advertised on NOIRLEGACY GROUP
  Telegram channel 2026-02-16. EvilTokens-specific HTTP signature
  for retro-hunt is the X-Antibot-Token header on landing pages.
  Self-hosted affiliate list was triaged with
  scripts/triage_domain_ownership.py on 2026-05-08; 12 of the 34
  apex-or-subdomain entries are flagged as compromised legitimate
  infrastructure (small businesses, medical practices, political
  campaigns) rather than attacker-owned. Those are listed under
  compromised_domains so the loader sets domain_type to
  compromised_legitimate and they are excluded from the malicious
  blocklist. The remaining 22 affiliate domains plus all 38
  Cloudflare Workers are kept under domains as malicious.

