description: |
  HarfangLab Inside The Lab report (identifier TRR260501, published 2026-05-13,
  authors Cyber Threat Research Team) on Gamaredon's active spearphishing
  campaign against Ukrainian state institutions. Campaign dates back to
  September 2025 and remains active as of May 8, 2026 (most recent wave at
  time of write). Infection chain abuses CVE-2025-8088 - the WinRAR alternate
  data stream / path traversal vulnerability - to drop persistent VBScript
  downloaders (GammaDrop) which fetch HTA payloads (GammaLoad) via Cloudflare
  Workers, Cloudflare quick tunnels, dynamic-DNS hostnames or the new
  standalone C2 domain rubakovox.pro. The 2026-05-05 / 2026-05-07 / 2026-05-08
  waves switched from RAR to ARJ archive format disguised as .rar / .zip;
  embedded campaign IDs include ProbArjDev-08-05, GisArjUkr-07-05, arjCF-05-05.
  User-Agents shifted to bot strings (Bingbot, Google AdsBot). DDR / fast-flux
  pool of attacker-registered .ru / .pro domains included below as malicious;
  scdevelopements.com included on the basis of SSL-cert overlap (SHA1
  43516afe903ff66743730e5cff4147183b563148) with confirmed attacker
  infrastructure. Per project triage discipline, Cloudflare Workers
  subdomains (*.workers.dev), Cloudflare quick tunnels (*.trycloudflare.com)
  and dyndns subdomains (*.myvnc.com, *.sytes.net, *.ddnsking.com,
  *.bounceme.net, *.ddns.net, *.3utilities.com, *.endl.site) are intentionally
  EXCLUDED - parent services are legitimate and attacker-controlled leaves
  rotate too quickly to warrant parent-level blocklisting. 125 SHA-256
  hashes, 1 SHA-1, file-path persistence indicators and full Cloudflare
  Workers leaf list are documented in HarfangLab's appendix and at
  https://github.com/HarfangLab/iocs/tree/main/TRR260501 - they are not
  represented in this YAML because the project schema currently has no
  hash / host-leaf field. Sister coverage includes Rewterz and The Record
  (Cloudflare-tunnels-spying-on-Ukrainian-targets framing).
