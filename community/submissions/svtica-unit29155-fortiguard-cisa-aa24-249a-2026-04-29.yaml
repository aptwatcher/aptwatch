description: >
  GRU 161st Specialist Training Center (Unit 29155) — Russian military intelligence unit
  conducting global cyber operations against NATO, EU, Central American, and Asian
  critical infrastructure for espionage, sabotage, and reputational harm. FortiGuard
  Outbreak Alert (russian-cyber-espionage-attack.pdf, 2026-04) re-affirms CISA/FBI/NSA
  joint advisory AA24-249A (2024-09-05): exploitation of public-facing apps (Atlassian
  Confluence, Sophos Firewall, Dahua IP cameras), WhisperGate destructive wiper
  (MITRE S0689) against Ukraine, and HiatusRAT scanning campaigns. Targeted sectors
  include government, financial services, transportation, energy, and healthcare.
