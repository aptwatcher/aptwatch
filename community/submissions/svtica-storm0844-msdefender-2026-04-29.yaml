description: >
  Storm-0844 is a cybercriminal subgroup of Periwinkle Tempest (DEV-0193, the TrickBot
  LLC ecosystem) conducting hands-on-keyboard ransomware operations with a payload
  progression Hive -> Royal (late 2022) -> Akira (June 2023) -> Fog (May 2024). Recent
  Microsoft reporting cites targeting of the airline industry. Tradecraft includes
  Bumblebee phishing handoffs, Cobalt Strike / Sliver C2, AnyDesk RMM, Veeam exploitation
  via CVE-2023-27532, reconnaissance via Advanced Port Scanner / Nmap / SharpShares /
  AdFind, credential access via ProcDump (LSASS), reg save (SAM/SYSTEM), Ntdsutil
  (ntds.dit) and Rubeus Kerberoasting, "sqladmin" persistence, RDP lateral movement,
  Ligolo tunneling, Rclone / SharpExfiltrate / FileZilla exfiltration, and ransomware
  deployment via Impacket / WMI.
