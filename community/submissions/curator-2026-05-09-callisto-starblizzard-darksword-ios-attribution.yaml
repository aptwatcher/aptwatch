description: >
  Attribution upgrade for escofiringbijou.com to Callisto / Star
  Blizzard / TA446 (FSB Centre 18). The domain is the second-stage
  TA446-controlled host that serves the leaked DarkSword iOS exploit
  kit, including the initial redirector, exploit loader, remote code
  execution component, and Pointer Authentication Code (PAC) bypass
  (Proofpoint Threat Insight 2026-03-28 / Malfors 2026-03-28).
  TA446 used the kit to deliver GHOSTBLADE (dataminer) and a known
  backdoor referred to as MAYBEROBOT via password-protected ZIPs in
  fake "discussion invitation" emails spoofing the Atlantic Council;
  one observed recipient was Russian opposition political director
  Leonid Volkov. Proofpoint noted email volume "significantly higher"
  than baseline and targeting "much wider than usual": government,
  think tanks, higher education, financial, and legal entities. This
  is the first documented FSB targeting of iCloud accounts and Apple
  devices for this group, closing a previously hardened collection
  gap. The Cyber News Network strategic briefing for the 24 March -
  8 May 2026 window reaffirmed continued operational use through
  early May 2026, with no confirmed infrastructure migration as of
  the runtime cut. DarkSword loader SHA-256
  b7ef4985662625c45955db295d949e04fd0a9fd5c8ce0c6a3bcb68e4a06c16e4
  on VirusTotal references this domain. The loader is a leaked
  variant of the kit originally tracked against UNC6353 watering
  holes, raising commodity-malware risk independent of TA446
  operations.

