description: >
  NCSC-UK joint advisory (Apr 7 2026) corroborated same-day by Microsoft Threat
  Intelligence (SOHO router compromise blog) and FBI IC3 PSA 260407 documents a
  long-running APT28 (Forest Blizzard) DNS hijacking operation active 2024-2026.
  Attribution: NCSC assesses APT28 is almost certainly GRU Unit 26165 (85th Main
  Special Service Centre, GTsSS). Scale at disclosure: ~5,000 routers compromised,
  ~200 organisations affected globally. Operation is opportunistic with filtering
  down to users of intelligence value. Two infrastructure clusters identified.
  Cluster 1 (malicious DNS + AitM): compromises SOHO routers (TP-Link primary,
  CVE-2023-50224 confirmed for WR841N model; ~23 TP-Link models observed) to
  overwrite DHCP/DNS settings and push attacker-controlled DNS as primary. DNS
  resolution is selective: only target domains (Outlook/M365 set listed below)
  are hijacked to attacker IPs, all other DNS queries resolve normally - evasion
  by selectivity. Some routers re-exploited with both primary and secondary DNS
  set to malicious IPs. Subsequent AitM operations harvest passwords and OAuth
  tokens; subsequent malicious logins likely originate from infrastructure NOT
  listed in this advisory. Cluster 2 (DNS forwarding + interactive ops):
  receives DNS via likely compromised MikroTik and TP-Link routers, forwards to
  further actor-owned servers; also conducts interactive operations against a
  small number of MikroTik routers in Ukraine of intelligence value. VPS banner
  signatures - cluster 1 pattern 1 = SSH on TCP/56777 + dnsmasq-2.85 on UDP/53;
  pattern 2 = SSH on TCP/35681 + dnsmasq-2.85 on UDP/53 (DNS present on some).
  MITRE ATT&CK: T1190 (Exploit Public-Facing Application via router HTTP), T1557
  (AitM), T1583.002 (Acquire Infrastructure - DNS Server), T1583.003 (Acquire
  Infrastructure - VPS), T1584.008 (Compromise Infrastructure - Network Devices),
  T1586 (Compromise Accounts), T1588.006 (Obtain Capabilities - Vulnerabilities).
  Companion reporting: The Register (security/2026/04/07/russias-fancy-bear-still-
  attacking-routers-to-boost-fake-sites-ncsc-warns), The Register companion
  (2026/04/07/russia_fancy_bear_ncsc_router_attack), Krebs on Security (Russia
  Hacked Routers to Steal Microsoft Office Tokens), CybelAngel (How APT28
  Hijacks Routers to Steal M365 Credentials), Infosecurity Magazine, The Hacker
  News, Industrial Cyber. Affected router models (NCSC-listed, non-exhaustive):
  TP-Link MR6400, Archer C5, Archer C7, WDR3500, WDR3600, WDR4300, WR740N,
  WR740N/WR741ND, WR749N, MR3420, WA801ND, WA901ND, WR1043ND, WR1045ND, WR840N,
  WR841HP, WR841N, WR841N/WR841ND, WR842N, WR842ND, WR845N, WR941ND, WR945N,
  plus MikroTik models (cluster 2). Cluster 1 IP density is highest in
  185.237.166.0/24 (47 IPs observed), 77.83.197.37-60 (24 IPs), 79.141.161.66-85
  (20 IPs), 37.221.64.0/24 (16 IPs). Targeted Outlook/M365 domains are
  autodiscover-s.outlook.com, imap-mail.outlook.com, outlook.live.com,
  outlook.office.com, outlook.office365.com - non-Outlook domains also targeted
  per NCSC but not enumerated in advisory.

