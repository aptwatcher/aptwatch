description: >
  Russophone RaaS first advertised December 2025 on a Russian-language
  forum, with publicized partnerships with TeamPCP and BreachForums for
  affiliate access and targeting. Version 2.0 (released February 2026)
  ships as statically compiled C++ executables for Windows, Linux, and
  VMware ESXi, all embedding libsodium and producing the same ".vect"
  encrypted file format and ransom note. Public reporting that described
  VECT as ChaCha20-Poly1305 was corrected: the malware uses raw
  ChaCha20-IETF (RFC 8439) without authentication, appending only a
  nonce and providing no integrity protection.

  Critical implementation flaw: files over 131,072 bytes are processed
  in four chunks, each encrypted with a freshly generated 12-byte nonce,
  but only the final nonce is written to disk -- the first three nonces
  are overwritten and discarded. The first three encrypted chunks of
  large files therefore cannot be decrypted by anyone, including the
  operators, making recovery impossible even if a ransom is paid. Smaller
  files (<131 KB) are encrypted in a single pass and remain decryptable.
  Result: VECT functions as an accidental wiper for any non-trivial file.

  Linked to TeamPCP's March 2026 supply-chain compromises that injected
  malware into widely used packages: Trivy, Checkmarx KICS, LiteLLM, and
  Telnyx. The Windows variant deletes shadow copies, clears event logs,
  performs lateral movement via WMI/DCOM, SMB admin shares, scheduled
  tasks, service creation, and PowerShell remoting, and supports
  safe-mode execution via boot configuration changes. Linux and ESXi
  variants include geofencing, anti-debug (TracerPid checks), kill
  services and shut down VMs across multiple hypervisors, wipe logs and
  shell histories, and propagate over SSH (key-harvesting + SCP +
  remote exec). Their advertised "fast/medium/secure" encryption modes
  are parsed but not actually implemented.

  Microsoft Defender signatures: Ransom:Win32/Avaddon.P!MSR,
  Trojan:Linux/Multiverze!rfn.

