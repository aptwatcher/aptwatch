description: >
  Microsoft attempted to patch CVE-2026-21510 (Windows Shell zero-day) in
  February 2026 after Akamai detected the APT28 group exploiting it in January
  2026 - attribution credited to Akamai primary research as cited by
  SecurityWeek, BleepingComputer and The Register on Apr 29 2026. The February
  patch was incomplete: a related authentication-coercion flaw, CVE-2026-32202,
  was disclosed Apr 29 2026 and is actively exploited in the wild. CVE-2026-32202
  enables an attacker to coerce a vulnerable Windows host into authenticating
  to attacker-controlled infrastructure across the network, exposing sensitive
  information through spoofing - functionally an NTLM-relay-style primitive
  riding atop the same Windows Shell code path. CISA added CVE-2026-32202 to
  the Known Exploited Vulnerabilities (KEV) catalog on Apr 29 2026 with a
  federal-civilian remediation deadline of May 12 2026. Cyderes published an
  analysis under the codename BlueHammer (cyderes.com/howler-cell/windows-zero-
  day-bluehammer). The original CVE-2026-21510 was one of six zero-days actively
  exploited in February 2026 per Microsoft's Patch Tuesday telemetry. TTPs in
  the public reporting align with prior APT28 tradecraft: initial access through
  exploitation of public-facing or client-side Windows components (MITRE T1190
  / T1203), privilege escalation via exploitation (T1068), credential theft via
  AitM and auth coercion (T1557 family - the auth coercion primitive is most
  consistent with T1557.001 LLMNR/NBT-NS poisoning relay patterns), and reuse
  of valid accounts post-exploitation (T1078). No network indicators (IPs,
  domains, hashes) have been published by Akamai or Microsoft in the press
  coverage as of 2026-04-29 - source primarily documents the CVE pair and
  attribution. Companion press coverage: The Register (2026/04/29/microsoft_
  zero_click_exploit), BleepingComputer (CISA orders feds to patch Windows
  flaw exploited as zero-day), TechRepublic, Notebookcheck, AmpcusCyber
  (Incomplete Patch for Windows Shell Bug Leads to New Zero-Day). Origin:
  flagged as grey-zone by the analyse-veille-securite-rss rattrapage run
  (8 May 2026, brief outputs/veille-securite-rss/veille-securite-rss-rattrapage-
  20260508-1552.md) - The Register's headline used "Russian spies" without an
  alias the skill LLM could match against, but Akamai's primary attribution to
  APT28 promotes this from grey-zone to confirmed Forest Blizzard activity.

cves:
  - CVE-2026-21510
  - CVE-2026-32202
